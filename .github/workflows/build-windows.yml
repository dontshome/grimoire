name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the build to (leave empty to just keep it as a workflow artifact)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          # Nothing after this needs to push or authenticate further (the
          # provenance fetch below is a public, unauthenticated read) — don't
          # leave a git credential sitting on the runner for the rest of the job.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      # build/pack.js checks HEAD against origin/main; make sure that ref is
      # actually fetched regardless of actions/checkout's default refspec.
      - run: git fetch origin main

      - run: npm run dist:windows

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: grimoire-windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

      - name: Upload to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ inputs.release_tag }}" dist/*.exe dist/*.exe.blockmap dist/latest.yml --clobber
