name: Build macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the build to (leave empty to just keep it as a workflow artifact)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      # build/pack.js checks HEAD against origin/main; make sure that ref is
      # actually fetched regardless of actions/checkout's default refspec.
      - run: git fetch origin main

      - run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: grimoire-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

      - name: Upload to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.release_tag }}" dist/*.dmg dist/*.zip dist/latest-mac.yml --clobber
